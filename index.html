<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SCADA Tensiones</title>

  <!-- ESTILOS -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/gauges.css">
</head>

<body>

<div class="panel">

  <h1>MONITOREO DE TENSIONES</h1>

  <!-- ===== GAUGES ===== -->
  <div class="gauges-container">

    <!-- L1 -->
    <div class="gauge-card">
      <h2>L1</h2>

      <canvas id="gaugeL1"></canvas>

      <div class="leds">
        <div class="led red" id="L1_red"></div>
        <div class="led yellow" id="L1_yellow"></div>
        <div class="led green" id="L1_green"></div>
      </div>
    </div>

    <!-- L2 -->
    <div class="gauge-card">
      <h2>L2</h2>

      <canvas id="gaugeL2"></canvas>

      <div class="leds">
        <div class="led red" id="L2_red"></div>
        <div class="led yellow" id="L2_yellow"></div>
        <div class="led green" id="L2_green"></div>
      </div>
    </div>

    <!-- L3 -->
    <div class="gauge-card">
      <h2>L3</h2>

      <canvas id="gaugeL3"></canvas>

      <div class="leds">
        <div class="led red" id="L3_red"></div>
        <div class="led yellow" id="L3_yellow"></div>
        <div class="led green" id="L3_green"></div>
      </div>
    </div>

  </div>

  <!-- ===== CONTROLES ===== -->
  <div class="controls">

    <div class="control-box">
      <label for="umin">Umin</label>
      <input type="range" id="umin" min="180" max="220" value="200">
      <span id="umin_val">200 V</span>
    </div>

    <div class="control-box">
      <label for="umax">Umax</label>
      <input type="range" id="umax" min="220" max="260" value="240">
      <span id="umax_val">240 V</span>
    </div>

  </div>

</div>

<!-- JS SIEMPRE AL FINAL -->
<script type="module" src="js./main.js"></script>

</body>
</html>
